<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix España · Social Intelligence Hub</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#04091a;
      background-image:
        radial-gradient(ellipse at 80% 10%, #0d2060 0%, transparent 55%),
        radial-gradient(ellipse at 20% 80%, #060d2e 0%, transparent 50%);
      color:#fff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* AUTH */
    #auth-overlay{
      position:fixed;inset:0;
      background:rgba(4,9,26,0.96);
      display:flex;align-items:center;justify-content:center;
      z-index:999;
    }
    .auth-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      padding:44px 48px;
      width:380px;
      text-align:center;
      backdrop-filter:blur(12px);
    }
    .auth-netflix{color:#E50914;font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;}
    .auth-title{font-size:14px;color:#888;margin-bottom:32px;letter-spacing:0.5px;}
    #auth-input{
      width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);
      border-radius:10px;color:#fff;font-size:15px;padding:13px 16px;outline:none;
      margin-bottom:8px;letter-spacing:2px;
    }
    #auth-input:focus{border-color:rgba(229,9,20,0.6);}
    .auth-error{color:#ff4444;font-size:12px;min-height:18px;margin-bottom:8px;}
    .auth-btn{
      width:100%;background:#E50914;color:#fff;border:none;border-radius:10px;
      padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;
    }
    .auth-btn:hover{background:#c40812;}

    /* LAYOUT */
    .page{display:none;flex-direction:column;min-height:100vh;}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:24px 36px;
    }
    .topbar-logo{height:36px;width:auto;}
    .topbar-social{height:28px;width:auto;}

    .hero{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:40px 20px 60px;
      text-align:center;
    }
    .hero-eyebrow{
      font-size:11px;font-weight:700;letter-spacing:3px;
      text-transform:uppercase;color:#E50914;margin-bottom:20px;
    }
    .hero-title{
      font-size:56px;font-weight:800;line-height:1.1;
      letter-spacing:-1.5px;margin-bottom:16px;
    }
    .hero-sub{
      font-size:16px;color:#8090aa;margin-bottom:32px;font-weight:400;
    }
    .hero-divider{
      width:56px;height:3px;background:#E50914;border-radius:2px;margin-bottom:44px;
    }

    /* BUTTONS */
    .btn-grid-row{display:flex;gap:16px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
    .btn-grid-row.single{justify-content:center;}
    .hub-btn{
      display:inline-flex;align-items:center;gap:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:50px;
      color:#fff;text-decoration:none;
      padding:16px 32px;
      font-size:15px;font-weight:600;
      letter-spacing:0.2px;
      transition:all .2s;
      min-width:240px;justify-content:center;
    }
    .hub-btn:hover{
      background:rgba(255,255,255,0.09);
      border-color:rgba(255,255,255,0.3);
    }
    .hub-btn-arrow{color:#E50914;font-size:16px;}
  </style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-title">España · Social Intelligence Hub</div>
    <input id="auth-input" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" class="auth-error"></div>
    <button onclick="checkAuth()" class="auth-btn">Acceder</button>
  </div>
</div>
